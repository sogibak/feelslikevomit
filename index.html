<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>고개 숙이면 재생되는 영상</title>
<style>
  html, body { margin: 0; height: 100%; background: #fff; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; font-family: -apple-system, sans-serif; }
  #content { max-width: 100vw; max-height: 100vh; display: block; }
  #webcam { position: fixed; bottom: 12px; right: 12px; width: 320px; transform: scaleX(-1); border-radius: 8px; opacity: 0.55; }
  #ui { position: fixed; top: 12px; left: 12px; z-index: 10; color: #000; }
  button { padding: 10px 16px; font-size: 14px; cursor: pointer; margin-right: 6px; }
  #status { margin-top: 8px; font-size: 12px; opacity: 0.85; white-space: pre; }
</style>
</head>
<body>

<div id="ui">
  <button id="startBtn">카메라 시작</button>
  <button id="calibrateBtn" disabled>정면 기준 잡기</button>
  <div id="status">대기 중...</div>
</div>

<!-- 여기 video.mp4를 실제 영상 파일명으로 교체 -->
<video id="content" src="feels like vomit.mp4" muted playsinline preload="auto"></video>
<video id="webcam" autoplay playsinline muted></video>

<script type="module">
import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const contentVideo = document.getElementById('content');
const webcamVideo = document.getElementById('webcam');
const startBtn = document.getElementById('startBtn');
const calibrateBtn = document.getElementById('calibrateBtn');
const statusEl = document.getElementById('status');

// ====== 튜닝 값: 실제로 테스트하면서 여기 숫자만 조절하면 됨 ======
const SENSITIVITY = 1.3;   // 클수록 조금만 숙여도 진행률이 빨리 움직임
const INVERT = true;    // 숙였는데 영상이 거꾸로 감기면 true로 바꾸기
const SMOOTHING = 0.15;  // 0~1, 작을수록 부드럽고 느리게 반응
// ================================================================

let faceLandmarker = null;
let baseline = null;
let smoothedProgress = 0;
let running = false;

async function setupFaceLandmarker() {
  const filesetResolver = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU"
    },
    outputFacialTransformationMatrixes: true,
    runningMode: "VIDEO",
    numFaces: 1
  });
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
  webcamVideo.srcObject = stream;
  await new Promise((r) => (webcamVideo.onloadedmetadata = r));
  await webcamVideo.play();
}

// 회전행렬(column-major 16개 값)에서 피치(고개 숙임/듦)와 상관있는 성분 추출
function getPitchRaw(matrix) {
  return matrix.data[9];
}

function loop() {
  if (!running) return;
  const now = performance.now();
  const result = faceLandmarker.detectForVideo(webcamVideo, now);

  if (result.facialTransformationMatrixes && result.facialTransformationMatrixes.length > 0) {
    const pitchRaw = getPitchRaw(result.facialTransformationMatrixes[0]);

    if (baseline === null) baseline = pitchRaw;

    let diff = pitchRaw - baseline;
    if (INVERT) diff = -diff;

    let targetProgress = 0.5 + diff * SENSITIVITY;
    targetProgress = Math.min(1, Math.max(0, targetProgress));

    smoothedProgress += (targetProgress - smoothedProgress) * SMOOTHING;

    if (contentVideo.duration && !isNaN(contentVideo.duration)) {
      contentVideo.currentTime = smoothedProgress * contentVideo.duration;
    }

    statusEl.textContent = `진행률: ${(smoothedProgress * 100).toFixed(0)}%\nraw diff: ${diff.toFixed(4)}`;
  } else {
    statusEl.textContent = "얼굴 인식 안 됨";
  }

  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  statusEl.textContent = "로딩 중...";
  await setupFaceLandmarker();
  await startCamera();

  contentVideo.pause(); // 자동재생 X, currentTime으로만 제어
  contentVideo.addEventListener('loadedmetadata', () => {
    statusEl.textContent = "영상 로드 완료. 정면 보고 '정면 기준 잡기' 눌러줘.";
  });

  running = true;
  calibrateBtn.disabled = false;
  requestAnimationFrame(loop);
});

calibrateBtn.addEventListener('click', () => {
  baseline = null; // 다음 프레임 각도를 새 기준으로 잡음
  statusEl.textContent = "기준 재설정 완료.";
});
</script>
</body>
</html>
